<!DOCTYPE html>
<html>
<head>

    <meta charset="UTF-8">
    <title>Cyber Defender</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" type="text/css" href="styles/main.css">
    

</head>

<body>

<div class="d-flex justify-content-center align-items-center vh-100">
    <div class="matrix" id="matrix"></div>
    <div class="flex-column">
        <div class="Title-init">
            <h1>Bem vindo a CyberDefender</h1> <!-- colocar o efeito das letras irem mudando até formar o titulo-->   
        </div>
        <div class="container container-hacker text-center w-75">
            <p id="typing-effect"></p>
            <button class="btn btn-hacker">Jogar</button>
            <button class="btn btn-hacker">Regras</button>
            <button class="btn btn-hacker">Cartas</button>
            <button class="btn btn-hacker">Sobre</button>
        </div>
    </div>

</div>

<div class="d-flex justify-content-between align-items-center img-bottom">
    <img class="sonar" src="img/sonar.gif" alt="Imagem Sonar" />
    <img class="globe" src="img/globe.gif" alt="Imagem Globe" />
</div>

<script src="scripts/typing.js"></script>
<script src="scripts/matrix.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
